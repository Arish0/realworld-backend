name: RealWorld Playwright

run-name: "RealWorld Playwright ${{ inputs.flow }} #${{ inputs.request_id }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Backend tracking id used to match this workflow run
        required: true
        type: string
      flow:
        description: Selected UI flow
        required: true
        type: string
      spec_file:
        description: Playwright spec file to run
        required: true
        type: string
      ui_config_json:
        description: JSON config produced by the dashboard
        required: true
        type: string

jobs:
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      REALWORLD_WEB2_EMAIL: ${{ fromJson(inputs.ui_config_json).borrowerEmail }}
      REALWORLD_WEB2_PASSWORD: ${{ fromJson(inputs.ui_config_json).borrowerPassword }}
      REALWORLD_LENDER_EMAIL: ${{ fromJson(inputs.ui_config_json).lenderEmail }}
      REALWORLD_LENDER_PASSWORD: ${{ fromJson(inputs.ui_config_json).lenderPassword }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mask dashboard secrets
        run: |
          echo "::add-mask::${REALWORLD_WEB2_PASSWORD}"
          echo "::add-mask::${REALWORLD_LENDER_PASSWORD}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Write UI config
        shell: bash
        run: |
          mkdir -p config
          cat > config/uiConfig.json <<'JSON'
          ${{ inputs.ui_config_json }}
          JSON

      - name: Show selected test
        run: |
          echo "Request id: ${{ inputs.request_id }}"
          echo "Flow: ${{ inputs.flow }}"
          echo "Spec: ${{ inputs.spec_file }}"

      - name: Run selected Playwright test
        run: |
          npx playwright test "${{ inputs.spec_file }}" --project=chromium --workers=1 --reporter=line 2>&1 | while IFS= read -r line; do
            echo "$line"
            curl -s -X POST -H "Content-Type: application/json" -d "{\"text\":$(echo "$line" | jq -R .)}" "https://realworld-backend-y89l.onrender.com/test-logs/${{ inputs.request_id }}" || true
          done

      - name: Upload Playwright test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ inputs.request_id }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.request_id }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload UI config used for run
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ui-config-${{ inputs.request_id }}
          path: config/uiConfig.json
          retention-days: 14

